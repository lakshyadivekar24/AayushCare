{% extends 'records/base.html' %}
{% block content %}
    <h2>Login</h2>
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
    <form method="post">
        {% csrf_token %}
        <select name="user_type" required>
            <option value="patient">Main Patient Hoon</option>
            <option value="doctor">Main Doctor Hoon</option>
        </select><br><br>
        Email: <input type="email" name="email" required><br><br>
        Password: <input type="password" name="password" required><br><br>
        <button type="submit">Login</button>
    </form>
    <p>Naye patient hain? <a href="{% url 'signup' %}">Yahan register karein</a>.</p>
    <p>Naye doctor hain? <a href="{% url 'doctor_signup' %}">Yahan register karein</a>.</p> {% endblock %}
